name: Drift Watch CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────────────── #
  #  1. Unit + integration tests                                         #
  # ──────────────────────────────────────────────────────────────────── #
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short --cov=drift_watch --cov-report=term-missing

      - name: Upload coverage report (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────── #
  #  2. End-to-end pipeline: train → simulate → detect                  #
  # ──────────────────────────────────────────────────────────────────── #
  train-and-detect:
    name: E2E Pipeline
    runs-on: ubuntu-latest
    needs: test      # only run after tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Train baseline model
        run: drift-watch train --n-samples 3000

      - name: Simulate production traffic (with drift)
        run: drift-watch simulate --n-samples 1000 --drift-factor 2.5

      - name: Run drift detection
        # drift-watch detect exits 1 when drift is found, which is expected.
        # We capture the exit code and annotate the step rather than failing CI.
        id: detect
        run: |
          drift-watch detect --save-report || echo "::warning::Drift detected — retraining recommended"

      - name: Show model registry
        run: drift-watch registry

      - name: Upload drift report artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: data/report.json
          if-no-files-found: ignore

      - name: (Optional) Retrain if drift was detected
        run: drift-watch retrain

      - name: Show updated registry after retrain
        run: drift-watch registry
